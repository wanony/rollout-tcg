services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tcg
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: tcg
      RABBITMQ_DEFAULT_PASS: dev
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.9
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:7700/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: tcg
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: db_pricing
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg"]
      interval: 5s
      timeout: 3s
      retries: 5

  identity-service:
    build:
      context: .
      dockerfile: src/IdentityService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5001
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=db_identity;Username=tcg;Password=dev"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  portfolio:
    build:
      context: .
      dockerfile: src/Portfolio/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__PortfolioDb: "Host=postgres;Port=5432;Database=db_portfolio;Username=tcg;Password=dev"
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  marketplace:
    build:
      context: .
      dockerfile: src/Marketplace/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5003
      ConnectionStrings__MarketplaceDb: "Host=postgres;Port=5432;Database=db_marketplace;Username=tcg;Password=dev"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: tcg
      RabbitMq__Password: dev
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification:
    build:
      context: .
      dockerfile: src/Notification/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5004
      ConnectionStrings__NotificationDb: "Host=postgres;Port=5432;Database=db_notification;Username=tcg;Password=dev"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: tcg
      RabbitMq__Password: dev
      Cors__AllowedOrigin: "http://localhost:3000"
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  card-catalog:
    build:
      context: .
      dockerfile: src/CardCatalog/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5005
      ConnectionStrings__CardDb: "Host=postgres;Port=5432;Database=db_cards;Username=tcg;Password=dev"
      MeiliSearch__Host: "http://meilisearch:7700"
      MeiliSearch__ApiKey: masterKey
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  pricing:
    build:
      context: .
      dockerfile: src/Pricing/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5006
      ConnectionStrings__PricingDb: "Host=timescaledb;Port=5432;Database=db_pricing;Username=tcg;Password=dev"
    ports:
      - "5006:5006"
    depends_on:
      timescaledb:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      Redis__ConnectionString: "redis:6379"
      Cors__AllowedOrigins: "http://localhost,https://rollout.wanony.dev"
    ports:
      - "5010:5000"
    depends_on:
      redis:
        condition: service_healthy
      portfolio:
        condition: service_started
      marketplace:
        condition: service_started
      notification:
        condition: service_started
      card-catalog:
        condition: service_started
      pricing:
        condition: service_started

  frontend:
    build:
      context: src/Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - identity-service

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    profiles: [observability]
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
      - prometheus
      - loki

  tempo:
    image: grafana/tempo:2.5.0
    profiles: [observability]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4319:4317"

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [observability]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.1.0
    profiles: [observability]
    volumes:
      - ./infra/loki/loki.yaml:/etc/loki/loki.yaml
      - loki_data:/tmp/loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.1.0
    profiles: [observability]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - prometheus
      - loki

volumes:
  postgres_data:
  rabbitmq_data:
  tempo_data:
  prometheus_data:
  loki_data:
  grafana_data:
  meilisearch_data:
  timescaledb_data:
