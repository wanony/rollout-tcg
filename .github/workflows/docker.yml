name: Docker

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      card-catalog: ${{ steps.filter.outputs.card-catalog }}
      identity-service: ${{ steps.filter.outputs.identity-service }}
      marketplace: ${{ steps.filter.outputs.marketplace }}
      notification: ${{ steps.filter.outputs.notification }}
      portfolio: ${{ steps.filter.outputs.portfolio }}
      pricing: ${{ steps.filter.outputs.pricing }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'src/SharedKernel/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - '.github/workflows/docker.yml'
            api-gateway:
              - 'src/ApiGateway/**'
            card-catalog:
              - 'src/CardCatalog/**'
            identity-service:
              - 'src/IdentityService/**'
            marketplace:
              - 'src/Marketplace/**'
            notification:
              - 'src/Notification/**'
            portfolio:
              - 'src/Portfolio/**'
            pricing:
              - 'src/Pricing/**'

  build:
    name: Build & push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      needs.changes.outputs.shared == 'true' ||
      fromJson(toJson(needs.changes.outputs))[matrix.service.name] == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            project: ApiGateway
          - name: card-catalog
            project: CardCatalog
          - name: identity-service
            project: IdentityService
          - name: marketplace
            project: Marketplace
          - name: notification
            project: Notification
          - name: portfolio
            project: Portfolio
          - name: pricing
            project: Pricing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tcgtrading-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/${{ matrix.service.project }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
