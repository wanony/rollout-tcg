name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop, "release/**"]

permissions:
  contents: read
  checks: write   # required for dorny/test-reporter to post check results

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore TCGTrading.sln

      - name: Build
        run: dotnet build TCGTrading.sln --no-restore -c Release

      - name: Test
        run: dotnet test TCGTrading.sln --no-build -c Release --logger "trx;LogFileName=results.trx" --results-directory TestResults

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: .NET Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail_on_error: false
