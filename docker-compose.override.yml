# Dev-only overrides — not committed with secrets in real projects
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: dev
  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: dev
  frontend:
    environment:
      # No TLS termination in front of the frontend container locally — tell the
      # Identity Service the real scheme so it computes the right OIDC issuer.
      FORWARDED_PROTO: http
